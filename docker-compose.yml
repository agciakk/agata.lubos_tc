version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: todo-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  todoapp:
    build: .
    container_name: todo-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/todoapp
      - JWT_SECRET=twojTajnyKlucz123
      - MAIL_SERVICE_URL=http://mail-service:5000
    depends_on:
      - mongodb
      - mail-service

  mail-service:
    build: ./mail-service
    container_name: todo-mail
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongodb

volumes:
  mongodb_data: