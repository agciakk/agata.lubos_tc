name: Deploy to Azure VM

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors==5.0.0 pymongo schedule pytest pytest-mock

      - name: Testy Jednostkowe (Pytest)
        run: pytest mail-service/test_unit.py

      - name: Install JS dependencies
        run: npm install

      - name: Testy Jednostkowe JS (Jest)
        run: npm test

      - name: Testy E2E Cypress
        uses: cypress-io/github-action@v7
        with:
          start: node server.js & python mail-service/app.py 
          wait-on: 'http://localhost:3000, http://localhost:5000'
          wait-on-timeout: 180
        env:
          GMAIL_USER: test@gmail.com
          GMAIL_PASSWORD: fake_password
          MONGO_URL: mongodb://localhost:27017/todoapp
          JWT_SECRET: test_secret_key
          
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v3
      
      - name: Podłącz SSH i wdróż
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          script: |
            cd ~/todoapp
            git pull origin master
            
            # DODANO JWT_SECRET DO PLIKU .ENV NA PRODUKCJI
            cat > .env <<EOF
            GMAIL_USER=${{ secrets.GMAIL_USER }}
            GMAIL_PASSWORD=${{ secrets.GMAIL_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MONGO_URL=mongodb://mongodb:27017/todoapp
            EOF
            
            docker-compose down
            docker-compose build --no-cache
            docker-compose up -d